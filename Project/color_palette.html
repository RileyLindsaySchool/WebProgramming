<!DOCTYPE html>

<html>
    <head>
        <title>Palette</title>

        <style>
            body {
                color: #212427;
                background-color: #F8F9FA;
                font-family: Verdana, Geneva, Tahoma, sans-serif
            }

            .color-primary {
                background-color: #B3CCFF;
            }

            .color-secondary {
                background-color: #6699FF;
            }

            .color-text {
                background-color: #212427;
                color: #ffffff;
            }
        </style>
    </head>

    <body>
        <table>
            <tr>
                <td>Primary</td><td class="color-primary">#B3CCFF</td>
            </tr>
            <tr>
                <td>Secondary</td><td class="color-secondary">#6699FF</td>
            </tr>
            <tr>
                <td>Background</td><td>#F8F9FA</td>
            </tr>
            <tr>
                <td>Text</td><td class="color-text">#212427</td>
            </tr>
            <tr>
                <td>Font style</td><td>Verdana</td>
            </tr>
        </table>
    </body>
</html>
